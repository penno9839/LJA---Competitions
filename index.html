<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="LJA Competitions"/>
  <meta name="theme-color" content="#1C1C1A"/>
  <title>LJA Competitions</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bjc:#C0392B;--bjc-light:#FDECEA;--bjc-dark:#922B21;
      --bja:#1A5276;--bja-light:#D6EAF8;--bja-dark:#154360;
      --aja:#B7950B;--aja-light:#FEF9E7;--aja-dark:#9A7D0A;
      --bg:#F8F7F4;--surface:#FFFFFF;--border:#E5E2DC;
      --text:#1C1C1A;--muted:#7A7870;--accent:#2C5F8A;
      --green:#1E8449;--green-light:#EAFAF1;
      --gold:#F1C40F;--silver:#BDC3C7;--bronze:#CD7F32;
    }
    body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
    .app{max-width:420px;margin:0 auto;min-height:100vh;background:var(--surface);padding-bottom:env(safe-area-inset-bottom)}
    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;font-family:sans-serif;color:var(--muted)}
    .loading-screen img{width:80px;height:auto}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .nav{display:flex;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;padding-top:env(safe-area-inset-top)}
    .nav-btn{flex:1;padding:11px 2px;font-size:11px;font-family:sans-serif;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;letter-spacing:.03em;text-transform:uppercase}
    .nav-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:bold}
    .page-header{padding:.875rem 1rem .75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .page-header img{width:44px;height:auto;flex-shrink:0}
    .page-header-text h1{font-size:18px;font-weight:normal;letter-spacing:-.02em;line-height:1.2}
    .page-header-text p{font-size:11px;color:var(--muted);margin-top:2px;font-family:sans-serif}
    .legend{display:flex;gap:12px;padding:.6rem 1rem;border-bottom:1px solid var(--border);overflow-x:auto}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-family:sans-serif;white-space:nowrap}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .month-nav{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem}
    .month-nav span{font-size:15px;letter-spacing:-.01em}
    .mnav{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 10px;cursor:pointer;font-family:inherit;font-size:14px;color:var(--text)}
    .mnav:hover{background:var(--bg)}
    .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:0 .75rem .5rem;background:var(--border)}
    .cal-wrap{background:var(--surface)}
    .dl{background:var(--bg);text-align:center;font-size:10px;color:var(--muted);padding:5px 0;font-family:sans-serif;text-transform:uppercase;letter-spacing:.05em}
    .dc{background:var(--surface);min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 2px;cursor:default}
    .dc.clickable{cursor:pointer}.dc.clickable:hover{background:var(--bg)}
    .dc-num{font-size:12px;font-family:sans-serif;color:var(--muted);line-height:1}
    .dc.today .dc-num{background:var(--text);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .dc-dots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;justify-content:center}
    .ddot{width:6px;height:6px;border-radius:50%}
    .event-list{padding:.5rem .75rem}
    .month-group{margin-bottom:1.25rem}
    .month-heading{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:sans-serif;padding:.5rem 0 .4rem;border-bottom:1px solid var(--border);margin-bottom:.5rem}
    .ecard{border-radius:6px;overflow:hidden;margin-bottom:.5rem;border:1px solid var(--border)}
    .ecard-sb{display:flex;align-items:stretch}
    .ecard-stripe{width:5px;flex-shrink:0}
    .ecard-body{flex:1;padding:.7rem .875rem}
    .ecard-title{font-size:14px;line-height:1.3}
    .ecard-date{font-size:11px;color:var(--muted);font-family:sans-serif;margin-top:4px}
    .ecard-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
    .assoc-badge{font-size:10px;font-family:sans-serif;font-weight:bold;padding:2px 7px;border-radius:3px;letter-spacing:.04em}
    .loc{font-size:11px;color:var(--muted);font-family:sans-serif}
    .ecard-docs{border-top:1px solid var(--border);padding:.6rem .875rem;display:none}
    .ecard-docs.open{display:block}
    .doc-row{display:flex;align-items:center;gap:8px;padding:5px 0;text-decoration:none;color:var(--text);border-bottom:1px solid var(--border);font-family:sans-serif}
    .doc-row:last-child{border-bottom:none}
    .doc-badge{font-size:9px;font-weight:bold;padding:2px 5px;border-radius:3px;font-family:sans-serif;flex-shrink:0}
    .pdf-b{background:#FDECEA;color:#922B21}.doc-b{background:#D6EAF8;color:#154360}.xls-b{background:#EAFAF1;color:#1E8449}
    .doc-name{font-size:12px;flex:1}
    .toggle-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:sans-serif;padding:0;margin-top:4px;display:block}
    .filters{display:flex;gap:6px;padding:.6rem 1rem;overflow-x:auto;border-bottom:1px solid var(--border)}
    .fpill{flex-shrink:0;font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:sans-serif;color:var(--muted)}
    .fpill.on{color:#fff;border-color:transparent}
    .admin-panel{padding:1rem .875rem}
    .section-hd{font-size:13px;font-weight:bold;font-family:sans-serif;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
    .form-group{margin-bottom:.75rem}
    .form-group label{display:block;font-size:11px;font-family:sans-serif;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
    .form-group input,.form-group select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:4px;font-family:sans-serif;font-size:13px;background:var(--surface);color:var(--text)}
    .btn{padding:8px 16px;border-radius:4px;font-family:sans-serif;font-size:13px;cursor:pointer;border:none}
    .btn-primary{background:var(--text);color:#fff}.btn-primary:hover{opacity:.85}
    .btn-danger{background:#FDECEA;color:var(--bjc-dark);border:1px solid #F5C6C6}
    .btn-success{background:var(--green-light);color:var(--green);border:1px solid #A9DFBF}
    .btn-warning{background:#FEF9E7;color:#9A7D0A;border:1px solid #F9E79F}
    .btn-sm{padding:4px 10px;font-size:11px}
    .btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg)}
    .doc-entry{display:flex;gap:6px;margin-bottom:6px;align-items:center}
    .doc-entry input{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:sans-serif}
    .doc-entry select{padding:6px 4px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:sans-serif}
    .remove-doc{background:none;border:none;color:var(--bjc);cursor:pointer;font-size:16px;padding:0 4px}
    .event-admin-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);font-family:sans-serif}
    .event-admin-row:last-child{border-bottom:none}
    .ear-title{font-size:13px}.ear-meta{font-size:11px;color:var(--muted)}
    .invite-row{display:flex;gap:6px;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);font-family:sans-serif;font-size:12px;flex-wrap:wrap}
    .invite-code{font-family:monospace;background:var(--bg);padding:3px 7px;border-radius:3px;font-size:11px;flex:1;word-break:break-all}
    .sb{font-size:10px;padding:2px 7px;border-radius:3px}
    .sb-active{background:#EAFAF1;color:#1E8449}.sb-revoked{background:#FDECEA;color:#922B21}.sb-used{background:#FEF9E7;color:#9A7D0A}
    .user-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);font-family:sans-serif;font-size:12px}
    .login-wrap{padding:2rem 1.25rem}
    .msg{font-size:12px;font-family:sans-serif;padding:8px 10px;border-radius:4px;margin:.25rem 0 .5rem}
    .msg.ok{background:#EAFAF1;color:#1E8449}.msg.err{background:#FDECEA;color:#922B21}.msg.info{background:#D6EAF8;color:#154360}
    .atabs{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;margin:.75rem .875rem .25rem}
    .atab{flex:1;padding:7px 2px;font-family:sans-serif;font-size:10px;background:none;border:none;cursor:pointer;color:var(--muted);white-space:nowrap}
    .atab.on{background:var(--text);color:#fff}
    .entries-table{width:100%;border-collapse:collapse;font-family:sans-serif;font-size:12px;margin-top:.5rem}
    .entries-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:5px 6px;border-bottom:1px solid var(--border);font-weight:normal}
    .entries-table td{padding:6px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
    .entries-table tr:last-child td{border-bottom:none}
    .grade-dot{width:12px;height:12px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px;flex-shrink:0}
    .autocomplete-wrap{position:relative}
    .ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:4px;z-index:50;max-height:160px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .ac-item{padding:8px 10px;font-family:sans-serif;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
    .ac-item:last-child{border-bottom:none}.ac-item:hover{background:var(--bg)}
    .entry-form{background:var(--bg);border-radius:6px;padding:.75rem;margin-bottom:.75rem;border:1px solid var(--border)}
    .fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .fg2 .form-group{margin-bottom:0}
    .rs{font-size:11px;font-family:sans-serif;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:4px}
    .rs-ok{background:var(--green-light);color:var(--green)}.rs-err{background:#FDECEA;color:#922B21}.rs-loading{background:#D6EAF8;color:#154360}
    .ec{font-size:11px;font-family:sans-serif;color:var(--muted);margin-left:6px}
    .league-page{padding:.75rem .875rem}
    .pts-key{display:flex;gap:6px;flex-wrap:wrap;padding:.6rem .75rem;background:var(--bg);border-radius:6px;border:1px solid var(--border);margin-bottom:.875rem}
    .pts-key-title{font-size:10px;font-family:sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;width:100%;margin-bottom:2px}
    .pts-pill{font-size:11px;font-family:sans-serif;padding:3px 9px;border-radius:999px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:4px;color:var(--muted)}
    .pts-pill strong{color:var(--text)}
    .pts-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .league-tbl{width:100%;border-collapse:collapse;font-family:sans-serif;font-size:12px}
    .league-tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:6px 5px;border-bottom:2px solid var(--border);font-weight:normal;white-space:nowrap}
    .league-tbl th.c{text-align:center}.league-tbl th.r{text-align:right}
    .league-tbl td{padding:8px 5px;border-bottom:1px solid var(--border);vertical-align:middle}
    .league-tbl tr:last-child td{border-bottom:none}
    .league-tbl tr.p1{background:#FFFDE7}.league-tbl tr.p2{background:#FAFAFA}.league-tbl tr.p3{background:#FFF8F2}
    .rank-cell{width:26px;text-align:center;font-size:14px}
    .pname{font-weight:600;font-size:13px;color:var(--text)}
    .pgrade{font-size:10px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:3px}
    .pts-val{text-align:right;font-size:16px;font-weight:700;color:var(--text)}
    .pts-label{text-align:right;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .medal-col{text-align:center;font-size:12px;color:var(--muted)}
    .comps-col{text-align:center;font-size:12px;color:var(--muted)}
    .league-empty{font-family:sans-serif;font-size:13px;color:var(--muted);text-align:center;padding:2rem 0;line-height:1.6}
    .res-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-family:sans-serif;font-size:12px}
    .res-row:last-child{border-bottom:none}
    .res-ev-hd{font-family:sans-serif;font-size:11px;font-weight:bold;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:.75rem 0 .25rem}
    .poll-section{border-top:1px solid var(--border);padding:.75rem .875rem;background:var(--bg)}
    .poll-title{font-size:12px;font-weight:bold;font-family:sans-serif;margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
    .poll-badge{font-size:10px;padding:2px 8px;border-radius:999px;font-family:sans-serif;font-weight:normal}
    .poll-open{background:#EAFAF1;color:var(--green)}
    .poll-closed{background:#FDECEA;color:var(--bjc-dark)}
    .video-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:.625rem;overflow:hidden}
    .video-card video{width:100%;display:block;max-height:200px;background:#000;object-fit:contain}
    .video-info{padding:.5rem .75rem}
    .video-label{font-size:13px;font-family:sans-serif;font-weight:500}
    .vote-bar-wrap{margin-top:.4rem}
    .vote-bar-bg{background:var(--border);border-radius:999px;height:6px;overflow:hidden;margin-top:3px}
    .vote-bar-fill{height:6px;border-radius:999px;background:var(--accent);transition:width .4s}
    .vote-bar-fill.winner{background:var(--gold)}
    .vote-meta{font-size:11px;font-family:sans-serif;color:var(--muted);margin-top:3px}
    .vote-btn{width:100%;padding:8px;font-family:sans-serif;font-size:13px;border:none;border-radius:0 0 8px 8px;cursor:pointer;font-weight:500}
    .vote-btn-active{background:var(--accent);color:#fff}
    .vote-btn-voted{background:var(--green-light);color:var(--green);cursor:default}
    .vote-btn-mine{background:#E8F4FD;color:var(--accent);cursor:default}
    .vote-btn-closed{background:var(--bg);color:var(--muted);cursor:default}
    .winner-banner{background:#FFFDE7;border:1px solid #F9E79F;border-radius:6px;padding:.5rem .75rem;font-family:sans-serif;font-size:12px;color:#7D6608;margin-bottom:.5rem}
    .video-admin-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:.5rem;overflow:hidden}
    .video-admin-card video{width:100%;max-height:140px;background:#000;display:block;object-fit:contain}
    .video-admin-body{padding:.5rem .75rem;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .video-admin-votes{font-size:11px;font-family:sans-serif;color:var(--muted)}
    .upload-area{border:2px dashed var(--border);border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;font-family:sans-serif;font-size:13px;color:var(--muted);margin-bottom:.75rem}
    .upload-area:hover{border-color:var(--accent);color:var(--accent)}
    .upload-area input{display:none}
    .poll-ctrl{display:flex;gap:8px;margin-top:.5rem;flex-wrap:wrap;align-items:center}
    .offline-banner{background:#FEF9E7;border-bottom:1px solid #F9E79F;padding:6px 1rem;font-family:sans-serif;font-size:11px;color:#9A7D0A;display:none}
    .offline-banner.show{display:block}
    .public-entry-section{border-top:1px solid var(--border);padding:.75rem .875rem;background:var(--bg)}
    .public-entry-toggle{width:100%;padding:9px 14px;font-family:sans-serif;font-size:13px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
    .public-entry-toggle:hover{opacity:.9}
    .public-entry-form{margin-top:.75rem;background:var(--surface);border-radius:8px;border:1px solid var(--border);padding:.875rem}
    .pub-fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem}
    .pub-fg2 .form-group{margin-bottom:0}
    .entry-list-title{font-size:11px;font-family:sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem;margin-top:.75rem}
    .entry-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-family:sans-serif;font-size:12px;margin:2px}
    .entry-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .submit-entry-btn{width:100%;padding:10px;background:var(--green);color:#fff;border:none;border-radius:6px;font-family:sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:.5rem}
    .submit-entry-btn:hover{opacity:.9}
    .submit-entry-btn:disabled{opacity:.6;cursor:default}
    .entries-count-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:sans-serif;background:var(--accent);color:#fff;padding:2px 8px;border-radius:999px;margin-left:6px}
  </style>
</head>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ── PASTE YOUR FIREBASE CONFIG HERE ─────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDK0u6dGw8uZvX5T3LLaJIV3-4yXLHOrls",
      authDomain: "lja---competitions.firebaseapp.com",
      projectId: "lja---competitions",
      storageBucket: "lja---competitions.firebasestorage.app",
      messagingSenderId: "602110458507",
      appId: "1:602110458507:web:2b70e09ca2374536b0f28e"
    };
    // ────────────────────────────────────────────────────────────────────────

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const storage = getStorage(firebaseApp);

    // ── FIREBASE HELPERS ─────────────────────────────────────────────────────
    async function fbLoad(key) {
      try {
        const snap = await getDoc(doc(db, 'appdata', key));
        return snap.exists() ? snap.data().value : null;
      } catch(e) { return null; }
    }
    async function fbSave(key, value) {
      try {
        await setDoc(doc(db, 'appdata', key), { value, updatedAt: Date.now() });
      } catch(e) { console.error('Save failed:', e); }
    }
    async function fbUploadVideo(evId, file, onProgress) {
      const path = `videos/${evId}/${Date.now()}_${file.name}`;
      const storageRef = ref(storage, path);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);
      return { url, path };
    }

    // Device ID
    function getDeviceId() {
      let id = localStorage.getItem('judo_device_id');
      if (!id) { id = 'dev_' + Math.random().toString(36).substr(2,12); localStorage.setItem('judo_device_id', id); }
      return id;
    }
    const DEVICE_ID = getDeviceId();

    const LOGO = '/icons/icon-192.png';
    const GRADES = [
      {l:'Ungraded',c:'#E8E8E8',b:'#ccc'},
      {l:'Yellow',c:'#F9E400',b:'#c8b800'},{l:'Orange',c:'#FF8C00',b:'#c06a00'},
      {l:'Green',c:'#2ECC71',b:'#1a9e52'},{l:'Blue',c:'#2980B9',b:'#1a5c8a'},
      {l:'Brown',c:'#7B4A2D',b:'#5a3520'},{l:'Black 1st',c:'#1C1C1A',b:'#000'},
      {l:'Black 2nd',c:'#1C1C1A',b:'#000'},{l:'Black 3rd',c:'#1C1C1A',b:'#000'},
    ];
    const ASSOC = {

    async function fetchRoster(url) {
      if (!url) { S.roster=[]; S.rosterStatus='idle'; render(); return; }
      S.rosterStatus='loading'; render();

      // Try direct first, then fall back through CORS proxies
      const attempts = [
        () => fetch(url),
        () => fetch('https://corsproxy.io/?' + encodeURIComponent(url)),
        () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url)),
        () => fetch('https://cors-anywhere.herokuapp.com/' + url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } }),
      ];

      let text = null;
      for (const attempt of attempts) {
        try {
          const r = await attempt();
          if (r.ok) { text = await r.text(); break; }
        } catch(e) { /* try next */ }
      }

      if (!text) { S.roster=[]; S.rosterStatus='error'; render(); return; }

      try {
        const lines = text.trim().split('\n');
        const hdrs = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
        S.roster = lines.slice(1).map(line=>{
          // Handle quoted CSV values with commas inside them
          const vs = []; let cur = ''; let inQ = false;
          for (const ch of line) {
            if (ch==='"') inQ=!inQ;
            else if (ch===',' && !inQ) { vs.push(cur.trim()); cur=''; }
            else cur+=ch;
          }
          vs.push(cur.trim());
          const o={}; hdrs.forEach((h,i)=>{o[h]=(vs[i]||'').replace(/^"|"$/g,'');});
          return o;
        }).filter(r=>(r.name||r.Name||'').trim());
        S.rosterStatus = S.roster.length > 0 ? 'ok' : 'empty';
      } catch(e) { S.roster=[]; S.rosterStatus='error'; }
      render();
    }

    function computeLeague() {
      const p = {};
      Object.entries(S.entries).forEach(([eid,cs])=>{ (cs||[]).forEach(c=>{ if(!c.name)return; if(!p[c.name])p[c.name]={name:c.name,grade:c.grade||'',comps:0,gold:0,silver:0,bronze:0,pollWins:0,pts:0}; p[c.name].comps++; p[c.name].pts+=PTS.entry; }); });
      Object.entries(S.results).forEach(([eid,rs])=>{ (rs||[]).forEach(r=>{ if(!r.name)return; if(!p[r.name])p[r.name]={name:r.name,grade:'',comps:0,gold:0,silver:0,bronze:0,pollWins:0,pts:0}; if(r.medal==='gold'){p[r.name].gold++;p[r.name].pts+=PTS.gold;} else if(r.medal==='silver'){p[r.name].silver++;p[r.name].pts+=PTS.silver;} else if(r.medal==='bronze'){p[r.name].bronze++;p[r.name].pts+=PTS.bronze;} }); });
      Object.values(S.pollWinners).forEach(w=>{ if(!w?.playerName)return; if(!p[w.playerName])p[w.playerName]={name:w.playerName,grade:'',comps:0,gold:0,silver:0,bronze:0,pollWins:0,pts:0}; p[w.playerName].pollWins++; p[w.playerName].pts+=PTS.poll; });
      return Object.values(p).sort((a,b)=>b.pts-a.pts||b.gold-a.gold||b.silver-a.silver||b.bronze-a.bronze);
    }

    function renderPollSection(card,ev,vids,poll){
      const sec=el('div','poll-section');

      const badge=el('span','poll-badge '+(poll.open?'poll-open':'poll-closed'));badge.textContent=poll.open?'Open':'Closed';titleRow.appendChild(badge);sec.appendChild(titleRow);
      const winner=S.pollWinners[ev.id];
      const totalVotes=vids.reduce((s,v)=>{const p=poll.votes||{};return s+(p[v.id]||0);},0);
      const myVote=(poll.voters||{})[DEVICE_ID];
      if(!poll.open&&winner){const wb=el('div','winner-banner');wb.innerHTML='🏆 <strong>'+winner.label+'</strong>'+(winner.playerName?' — '+winner.playerName+' earned +5 pts':'');sec.appendChild(wb);}

        const vi=el('div','video-info');const vlbl=el('div','video-label');vlbl.textContent=v.label;vi.appendChild(vlbl);
        const votes=(poll.votes||{})[v.id]||0;const pct=totalVotes>0?Math.round(votes/totalVotes*100):0;
        const isWinner=!poll.open&&winner&&winner.videoId===v.id;
        if(totalVotes>0||!poll.open){const vbw=el('div','vote-bar-wrap');const bg=el('div','vote-bar-bg');const fill=el('div','vote-bar-fill'+(isWinner?' winner':''));fill.style.width=pct+'%';bg.appendChild(fill);vbw.appendChild(bg);const vm=el('div','vote-meta');vm.textContent=votes+' vote'+(votes!==1?'s':'')+' · '+pct+'%';vbw.appendChild(vm);vi.appendChild(vbw);}
        vc.appendChild(vi);
        if(poll.open){
          const vbtn=el('button');
          if(myVote===v.id){vbtn.className='vote-btn vote-btn-mine';vbtn.textContent='✓ Your vote';}

      const form=el('div');form.appendChild(fgroup('Title','text','ev-title',ev.title));form.appendChild(fgroup('Location','text','ev-loc',ev.location));form.appendChild(fgroup('Date','date','ev-date',ev.date));form.appendChild(fgroup('Association','select','ev-assoc',ev.assoc,Object.keys(ASSOC)));
      const dg=el('div','form-group');const dl=el('label');dl.textContent='Documents';dg.appendChild(dl);const docList=el('div');
      function renderDocs(){docList.innerHTML='';S.docEntries.forEach((doc,i)=>{const row=el('div','doc-entry');const ni=document.createElement('input');ni.placeholder='Name';ni.value=doc.name;ni.oninput=e=>S.docEntries[i].name=e.target.value;const ui=document.createElement('input');ui.placeholder='URL';ui.value=doc.url;ui.oninput=e=>S.docEntries[i].url=e.target.value;const ts=el('select');['pdf','doc','xls'].forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t.toUpperCase();if(t===doc.type)o.selected=true;ts.appendChild(o);});ts.onchange=e=>S.docEntries[i].type=e.target.value;const rm=el('button','remove-doc');rm.textContent='×';rm.onclick=()=>{S.docEntries.splice(i,1);renderDocs();};row.appendChild(ni);row.appendChild(ui);row.appendChild(ts);row.appendChild(rm);docList.appendChild(row);});const ab=el('button','btn btn-outline btn-sm');ab.textContent='+ Add document';ab.onclick=()=>{S.docEntries.push({name:'',url:'',type:'pdf'});renderDocs();};docList.appendChild(ab);}
      renderDocs();dg.appendChild(docList);form.appendChild(dg);
      const sb=el('button','btn btn-primary');sb.textContent=S.editingEvent?'Update':'Add event';
      sb.onclick=async()=>{const title=(document.getElementById('ev-title').value||'').trim();const location=(document.getElementById('ev-loc').value||'').trim();const date=document.getElementById('ev-date').value;const assoc=document.getElementById('ev-assoc').value;if(!title||!date){showMsg('Title and date required.',false);return;}const docs=S.docEntries.filter(d=>d.name&&d.url);if(S.editingEvent){S.events=S.events.map(e=>e.id===S.editingEvent.id?{...e,title,location,date,assoc,docs}:e);}else{S.events.push({id:'e'+Date.now(),title,location,date,assoc,docs});}await save('events',S.events);S.editingEvent=null;S.docEntries=[{name:'',url:'',type:'pdf'}];showMsg('Event saved.',true);render();};
      form.appendChild(sb);if(S.editingEvent){const can=el('button','btn btn-outline');can.textContent='Cancel';can.style.marginLeft='8px';can.onclick=()=>{S.editingEvent=null;render();};form.appendChild(can);}
      const eh=el('div','section-hd');eh.style.marginTop='1.25rem';eh.textContent='All events';panel.appendChild(form);panel.appendChild(eh);
      [...S.events].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(ev=>{const row=el('div','event-admin-row');const info=el('div');const t=el('div','ear-title');t.textContent=ev.title;info.appendChild(t);const m=el('div','ear-meta');m.textContent=new Date(ev.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' · '+ev.assoc;info.appendChild(m);const btns=el('div');btns.style.cssText='display:flex;gap:6px';const ed=el('button','btn btn-outline btn-sm');ed.textContent='Edit';ed.onclick=()=>{S.editingEvent={...ev,docs:[...(ev.docs||[])]};render();};const del=el('button','btn btn-danger btn-sm');del.textContent='Delete';del.onclick=async()=>{if(confirm('Delete?')){S.events=S.events.filter(e=>e.id!==ev.id);delete S.entries[ev.id];delete S.results[ev.id];delete S.videos[ev.id];delete S.polls[ev.id];delete S.pollWinners[ev.id];await save('events',S.events);await save('entries',S.entries);await save('results',S.results);await save('videos',S.videos);await save('polls',S.polls);await save('pollWinners',S.pollWinners);render();}};btns.appendChild(ed);btns.appendChild(del);row.appendChild(info);row.appendChild(btns);panel.appendChild(row);});
    }

    function renderSheetsTab(panel){
      const hd=el('div','section-hd');hd.textContent='Google Sheets roster';panel.appendChild(hd);
      const info=el('div','msg info');info.innerHTML='<strong>How to connect:</strong><br>1. Open Google Sheet<br>2. File → Share → Publish to web → CSV<br>3. Paste URL below<br><br>Columns: <strong>name, age, weight, grade</strong>';panel.appendChild(info);
      const g=el('div','form-group');g.style.marginTop='.75rem';const l=el('label');l.textContent='Published CSV URL';g.appendChild(l);const inp=document.createElement('input');inp.type='url';inp.placeholder='https://docs.google.com/spreadsheets/d/…';inp.value=S.sheetsUrl||'';inp.style.fontSize='12px';g.appendChild(inp);panel.appendChild(g);
      if(S.rosterStatus==='loading'){
        const s=el('div','msg info');s.textContent='⏳ Loading roster — trying multiple connections…';panel.appendChild(s);
      }else if(S.rosterStatus==='ok'){
        const s=el('div','msg ok');s.textContent='✓ '+S.roster.length+' member'+(S.roster.length!==1?'s':'')+' loaded successfully';panel.appendChild(s);
      }else if(S.rosterStatus==='empty'){
        const s=el('div','msg info');s.innerHTML='⚠ Sheet loaded but no rows found. Check your sheet has a header row with <strong>name, age, weight, grade</strong> columns.';panel.appendChild(s);
      }else if(S.rosterStatus==='error'){
        const s=el('div','msg err');s.innerHTML='❌ Could not load sheet. Check:<br><br>1. Used <strong>File → Share → Publish to web</strong> (not regular Share)<br>2. Selected <strong>CSV</strong> format<br>3. URL ends with <strong>output=csv</strong><br>4. Not a restricted work/school Google account';panel.appendChild(s);
      }
      const btn=el('button','btn btn-primary');btn.style.marginTop='.75rem';btn.textContent='Connect sheet';btn.onclick=async()=>{const url=inp.value.trim();S.sheetsUrl=url;await save('sheetsUrl',url);fetchRoster(url);};panel.appendChild(btn);
    }

    function renderInvitesTab(panel){
      const hd=el('div','section-hd');hd.textContent='Invite links';panel.appendChild(hd);
      const gb=el('button','btn btn-primary');gb.textContent='Generate invite link';gb.onclick=async()=>{const code='INV-'+Math.random().toString(36).substr(2,8).toUpperCase();const link=window.location.origin+'?invite='+code;S.invites.push({code,link,status:'active'});await save('invites',S.invites);render();};panel.appendChild(gb);
      S.invites.forEach((inv,i)=>{const row=el('div','invite-row');const code=el('span','invite-code');code.textContent=inv.link;const st=el('span','sb sb-'+(inv.status==='active'?'active':inv.status==='used'?'used':'revoked'));st.textContent=inv.status;const btns=el('div');btns.style.cssText='display:flex;gap:6px;flex-shrink:0';const cp=el('button','btn btn-outline btn-sm');cp.textContent='Copy';cp.onclick=()=>{navigator.clipboard.writeText(inv.link);cp.textContent='Copied!';setTimeout(()=>cp.textContent='Copy',1500);};btns.appendChild(cp);if(inv.status==='active'){const rv=el('button','btn btn-danger btn-sm');rv.textContent='Revoke';rv.onclick=async()=>{S.invites[i].status='revoked';await save('invites',S.invites);render();};btns.appendChild(rv);}row.appendChild(code);row.appendChild(st);row.appendChild(btns);panel.appendChild(row);});
    }

    function renderUsersTab(panel){
      const hd=el('div','section-hd');hd.textContent='Users';panel.appendChild(hd);
      S.users.forEach((u,i)=>{const row=el('div','user-row');const info=el('div');const em=el('div');em.style.fontWeight='500';em.textContent=u.email;info.appendChild(em);const role=el('div');role.style.color='var(--muted)';role.textContent=u.role;info.appendChild(role);const btns=el('div');btns.style.cssText='display:flex;gap:6px';if(u.role!=='admin'&&u.email!==S.currentUser.email){const del=el('button','btn btn-danger btn-sm');del.textContent='Remove';del.onclick=async()=>{S.users.splice(i,1);await save('users',S.users);render();};btns.appendChild(del);}row.appendChild(info);row.appendChild(btns);panel.appendChild(row);});
    }

    function renderLogin(){
      const app=document.getElementById('app');mkHeader('Leicester Judo Academy');
      const wrap=el('div','login-wrap');const tabs=el('div','atabs');tabs.style.margin='0 0 1rem';let mode=true;
      const t1=el('button','atab on');t1.textContent='Sign in';const t2=el('button','atab');t2.textContent='Register with invite';
      t1.onclick=()=>{mode=true;t1.className='atab on';t2.className='atab';rebuild();};t2.onclick=()=>{mode=false;t1.className='atab';t2.className='atab on';rebuild();};
      tabs.appendChild(t1);tabs.appendChild(t2);wrap.appendChild(tabs);
      const fw=el('div');wrap.appendChild(fw);
      function rebuild(){fw.innerHTML='';if(mode){fw.appendChild(fgroup('Email','email','lg-em',''));fw.appendChild(fgroup('Password','password','lg-pw',''));const b=el('button','btn btn-primary');b.style.width='100%';b.style.marginTop='.5rem';b.textContent='Sign in';b.onclick=async()=>{const em=(document.getElementById('lg-em').value||'').trim();const pw=document.getElementById('lg-pw').value;const user=S.users.find(u=>u.email===em&&u.password===pw);if(user){S.currentUser={email:user.email,role:user.role};localStorage.setItem('judo_session',JSON.stringify(S.currentUser));S.view='admin';render();}else{const m=el('div','msg err');m.textContent='Invalid credentials.';fw.appendChild(m);}};fw.appendChild(b);}else{fw.appendChild(fgroup('Invite code','text','lg-code',''));fw.appendChild(fgroup('Email','email','lg-em2',''));fw.appendChild(fgroup('Password','password','lg-pw2',''));const b=el('button','btn btn-primary');b.style.width='100%';b.style.marginTop='.5rem';b.textContent='Create account';b.onclick=async()=>{const code=(document.getElementById('lg-code').value||'').trim();const em=(document.getElementById('lg-em2').value||'').trim();const pw=document.getElementById('lg-pw2').value;const inv=S.invites.find(i=>i.code===code&&i.status==='active');if(!inv){const m=el('div','msg err');m.textContent='Invalid or revoked invite.';fw.appendChild(m);return;}if(S.users.find(u=>u.email===em)){const m=el('div','msg err');m.textContent='Email already registered.';fw.appendChild(m);return;}S.users.push({email:em,password:pw,role:'editor'});inv.status='used';await save('users',S.users);await save('invites',S.invites);S.currentUser={email:em,role:'editor'};localStorage.setItem('judo_session',JSON.stringify(S.currentUser));S.view='admin';render();};fw.appendChild(b);}}
      rebuild();app.appendChild(wrap);
    }

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }

    init();
  </script>
</body>
</html>
